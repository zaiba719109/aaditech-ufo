{% extends "base.html" %}

{% block title %}Backup Management{% endblock %}

{% block content %}
<div class="backup-panel">
    <h2>Backup Management</h2>
    
    <div class="actions">
        <button onclick="createBackup()" class="btn-primary">Create New Backup</button>
    </div>

    <div class="backup-list">
        <h3>Available Backups</h3>
        <table>
            <thead>
                <tr>
                    <th>Backup Date</th>
                    <th>Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for backup in backups %}
                <tr>
                    <td>{{ backup.timestamp }}</td>
                    <td>{{ backup.size }} MB</td>
                    <td>
                        <button onclick="restoreBackup('{{ backup.filename }}')" class="btn-warning">Restore</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
    .backup-panel {
        padding: 20px;
    }
    .actions {
        margin: 20px 0;
    }
    .btn-primary {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .btn-warning {
        background-color: #ff9800;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .backup-list table {
        width: 100%;
        margin-top: 20px;
    }
    .backup-list th, .backup-list td {
        padding: 12px;
        text-align: left;
    }
</style>

<script>
function createBackup() {
    if (confirm('Create a new backup?')) {
        fetch('/backup/create', {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            location.reload();
        })
        .catch(error => alert('Error creating backup'));
    }
}

function restoreBackup(filename) {
    if (confirm('Are you sure you want to restore this backup? Current data will be overwritten.')) {
        fetch(`/backup/restore/${filename}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            location.reload();
        })
        .catch(error => alert('Error restoring backup'));
    }
}
</script>
{% endblock %}
