{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-3">Tenant Login</h2>
                <p class="text-muted">Use your tenant slug and credentials to access the browser dashboard.</p>
                <form method="post" action="{{ url_for('web.login', next=next_url) }}">
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div class="form-group">
                        <label for="tenant_slug">Tenant Slug</label>
                        <input id="tenant_slug" name="tenant_slug" class="form-control" value="{{ tenant_slug }}" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
